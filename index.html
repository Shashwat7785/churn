<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Predictor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1, h2 { color: #333; }
        .section-title { margin-top: 30px; border-bottom: 2px solid #eee; padding-bottom: 5px; color: #0056b3; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 15px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: 600; font-size: 14px; color: #555; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .btn { width: 100%; padding: 15px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 30px; }
        .btn:hover { background-color: #004494; }
        .result-box { margin-top: 30px; padding: 20px; text-align: center; border-radius: 4px; font-size: 24px; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Customer Churn Prediction Dashboard</h1>
        
        <form action="{{ url_for('predict') }}" method="post">
            
            <h2 class="section-title">Demographics</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Senior Citizen</label>
                    <select name="SeniorCitizen" required>
                        <option value="0">No (0)</option>
                        <option value="1">Yes (1)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Partner</label>
                    <select name="Partner" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Dependents</label>
                    <select name="Dependents" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <h2 class="section-title">Account Information</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Tenure (Months)</label>
                    <input type="number" name="tenure" required min="0">
                </div>
                <div class="form-group">
                    <label>Contract Type</label>
                    <select name="Contract" required>
                        <option value="Month-to-month">Month-to-month</option>
                        <option value="One year">One year</option>
                        <option value="Two year">Two year</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Paperless Billing</label>
                    <select name="PaperlessBilling" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Payment Method</label>
                    <select name="PaymentMethod" required>
                        <option value="Electronic check">Electronic check</option>
                        <option value="Mailed check">Mailed check</option>
                        <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                        <option value="Credit card (automatic)">Credit card (automatic)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Total Charges ($)</label>
                    <input type="number" step="0.01" name="TotalCharges" required min="0">
                </div>
            </div>

            <h2 class="section-title">Services Subscribed</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Phone Service</label>
                    <select name="PhoneService" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Multiple Lines</label>
                    <select name="MultipleLines" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No phone service">No phone service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Internet Service</label>
                    <select name="InternetService" required>
                        <option value="DSL">DSL</option>
                        <option value="Fiber optic">Fiber optic</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Online Security</label>
                    <select name="OnlineSecurity" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Online Backup</label>
                    <select name="OnlineBackup" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Device Protection</label>
                    <select name="DeviceProtection" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Tech Support</label>
                    <select name="TechSupport" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Streaming TV</label>
                    <select name="StreamingTV" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Streaming Movies</label>
                    <select name="StreamingMovies" required>
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn">Run Prediction</button>
        </form>

        {% if prediction_text %}
            <div class="result-box {{ color_class }}">
                {{ prediction_text }}
            </div>
        {% endif %}
    </div>
</body>
</html>
